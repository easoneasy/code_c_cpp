<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>云舟 · 个人工作台</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-base: #f8fafc;
      --surface-white: #ffffff;
      --border-soft: #e9edf2;
      --text-main: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --accent-primary: #1e40af;
      --accent-soft: #eef2ff;
      --accent-hover: #1e3a8a;
      --success-green: #10b981;
      --success-hover: #059669;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.03), 0 1px 3px 0 rgba(0, 0, 0, 0.02);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
      --transition: all 0.2s ease;
    }

    body {
      background: var(--bg-base);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      color: var(--text-main);
      line-height: 1.5;
      min-height: 100vh;
    }

    .full-page {
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 0;
    }

    .top-nav {
      background: var(--surface-white);
      border-bottom: 1px solid var(--border-soft);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-area {
      font-weight: 700;
      font-size: 1.3rem;
      background: linear-gradient(120deg, #0f2b5e, #2d4a8a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .logout-top-btn {
      background: transparent;
      border: 1px solid var(--border-soft);
      padding: 0.45rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #475569;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .logout-top-btn:hover {
      background: #fee2e2;
      border-color: #f87171;
      color: #b91c1c;
    }

    .main-content {
      width: 100%;
      padding: 2rem 2rem 3rem 2rem;
    }

    .hero-banner {
      background: linear-gradient(105deg, #ffffff 0%, #f1f5fe 100%);
      border-radius: 24px;
      padding: 1.8rem 2rem;
      margin-bottom: 2rem;
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-sm);
      width: 100%;
    }

    .hero-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0a2540;
      margin-bottom: 0.3rem;
    }

    .hero-sub {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2.5rem;
      width: 100%;
    }

    .stat-card {
      background: var(--surface-white);
      border-radius: 20px;
      padding: 1.2rem 1.5rem;
      border: 1px solid var(--border-soft);
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.08);
      border-color: #cbd5e1;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-value {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text-main);
      word-break: break-word;
    }

    .files-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border-soft);
      padding-bottom: 0.8rem;
    }

    .files-header h2 {
      font-size: 1.35rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.45rem 1.1rem;
      font-weight: 500;
      font-size: 0.8rem;
      border-radius: 40px;
      background: var(--surface-white);
      border: 1px solid var(--border-soft);
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      color: var(--text-secondary);
    }

    .btn-primary {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: scale(0.97);
    }

    .hidden-file-input {
      display: none;
    }

    .files-table-wrapper {
      background: var(--surface-white);
      border-radius: 20px;
      border: 1px solid var(--border-soft);
      overflow-x: auto;
      width: 100%;
      box-shadow: var(--shadow-sm);
    }

    .files-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 800px;
    }

    .files-table th {
      text-align: left;
      padding: 1rem 1.2rem;
      background-color: #fafcff;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-soft);
    }

    .files-table td {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #f0f2f5;
      vertical-align: middle;
      color: var(--text-main);
    }

    .files-table tr:hover {
      background-color: #fafbff;
    }

    .file-name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }

    .file-icon {
      font-size: 1.3rem;
    }

    .file-meta {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .file-size-badge {
      background: #f1f5f9;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
      display: inline-block;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-icon {
      padding: 0.3rem 0.8rem;
      font-size: 0.7rem;
      background: transparent;
      border: 1px solid var(--border-soft);
      border-radius: 30px;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .btn-icon:hover {
      background: #f1f5f9;
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .btn-download {
      background: #eef2ff;
      border-color: #c7d2fe;
      color: var(--accent-primary);
    }

    .btn-download:hover {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: white;
    }

    .pagination-container {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-top: 1.5rem;
      padding: 0.5rem 0;
    }

    .pagination-btn {
      padding: 0.4rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 500;
      border: 1px solid var(--border-soft);
      background: white;
      border-radius: 30px;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      color: var(--text-secondary);
    }

    .pagination-btn:hover:not(:disabled) {
      background: var(--accent-soft);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .pagination-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .pagination-btn.active {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: white;
    }

    .pagination-info {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-right: 1rem;
    }

    .empty-state,
    .loading-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      background: white;
      border-radius: 20px;
      width: 100%;
    }

    .loading-state {
      display: flex;
      justify-content: center;
      gap: 12px;
      align-items: center;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e2e8f0;
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .upload-progress {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: white;
      border-radius: 16px;
      padding: 1rem 1.5rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
      border-left: 4px solid var(--accent-primary);
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .main-content {
        padding: 1rem;
      }

      .top-nav {
        padding: 0 1rem;
      }

      .hero-title {
        font-size: 1.4rem;
      }

      .stat-value {
        font-size: 1.3rem;
      }

      .action-buttons {
        flex-direction: column;
        gap: 4px;
      }

      .btn-icon {
        padding: 0.25rem 0.6rem;
      }

      .pagination-container {
        justify-content: center;
        flex-wrap: wrap;
      }

      .pagination-info {
        width: 100%;
        text-align: center;
        margin-right: 0;
        margin-bottom: 0.5rem;
      }
    }
  </style>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="full-page" id="app" style="display: none;">
    <div class="top-nav">
      <div class="logo-area">⛵ 云舟 · 个人云盘</div>
      <button id="logout-top-btn" class="logout-top-btn">🚪 退出登录</button>
    </div>

    <div class="main-content">
      <div class="hero-banner">
        <div class="hero-title" id="greeting-text">下午好, 用户</div>
        <div class="hero-sub">管理你的文件，随时随地访问</div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">🆔 账户ID</div>
          <div class="stat-value" id="stat-user-id">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">📛 用户名</div>
          <div class="stat-value" id="stat-username">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">📅 加入时间</div>
          <div class="stat-value" id="stat-joined">—</div>
        </div>
      </div>

      <div class="files-header">
        <h2>📁 我的文件</h2>
        <div class="btn-group">
          <button id="upload-file-btn" class="btn btn-primary">📤 上传文件</button>
        </div>
      </div>

      <input type="file" id="file-input" class="hidden-file-input" multiple>

      <div class="files-table-wrapper">
        <table class="files-table" id="files-table">
          <thead>
            <tr>
              <th>文件名</th>
              <th>大小</th>
              <th>创建时间</th>
              <th>最后修改</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="files-tbody">
            <tr>
              <td colspan="5" class="loading-state">
                <div class="spinner"></div> 加载文件中...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 分页组件 -->
      <div class="pagination-container" id="pagination-container">
        <span class="pagination-info" id="pagination-info">第 1 / 1 页，共 0 个文件</span>
        <button class="pagination-btn" id="first-page-btn" disabled>⏮ 首页</button>
        <button class="pagination-btn" id="prev-page-btn" disabled>◀ 上一页</button>
        <span id="page-numbers"></span>
        <button class="pagination-btn" id="next-page-btn" disabled>下一页 ▶</button>
        <button class="pagination-btn" id="last-page-btn" disabled>末页 ⏭</button>
      </div>
    </div>
  </div>

  <script type="module">
    import {userApi, triggerDownload} from './static/api.js';

    // ---------- 全局状态 ----------
    let allFiles = [];
    let currentPage = 1;
    const PAGE_SIZE = 15;

    // ---------- 辅助函数 ----------
    // 修复：更健壮的文件大小格式化函数
    function formatFileSize(bytes) {
      // 处理各种无效输入
      if (bytes === null || bytes === undefined || bytes === '') {
        return '0 B';
      }
      // 如果是字符串，尝试转换为数字
      let numBytes = typeof bytes === 'string' ? parseInt(bytes, 10) : bytes;
      if (isNaN(numBytes) || numBytes === 0) {
        return '0 B';
      }
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(numBytes) / Math.log(k));
      const formattedSize = parseFloat((numBytes / Math.pow(k, i)).toFixed(2));
      // 避免显示 "-0" 的情况
      return (formattedSize === 0 ? '0' : formattedSize) + ' ' + sizes[i];
    }

    function formatDateTime(dateString) {
      if (!dateString) return '—';
      try {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return '—';
        return date.toLocaleString('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });
      } catch (e) {
        return '—';
      }
    }

    function getFileIcon(filename) {
      if (!filename) return '📄';
      const ext = filename.split('.').pop().toLowerCase();
      if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'].includes(ext)) return '🖼️';
      if (['mp4', 'mov', 'avi', 'mkv', 'webm'].includes(ext)) return '🎬';
      if (['mp3', 'wav', 'flac', 'aac'].includes(ext)) return '🎵';
      if (['pdf'].includes(ext)) return '📑';
      if (['doc', 'docx'].includes(ext)) return '📝';
      if (['xls', 'xlsx', 'csv'].includes(ext)) return '📊';
      if (['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) return '🗜️';
      if (['txt', 'md', 'log', 'json', 'xml', 'yaml', 'yml'].includes(ext)) return '📃';
      return '📎';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function (m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function setGreeting() {
      const hour = new Date().getHours();
      let greeting = '';
      if (hour < 12) greeting = '早上好';
      else if (hour < 18) greeting = '下午好';
      else greeting = '晚上好';
      const userNameElem = document.getElementById('greeting-text');
      if (userNameElem && window.currentUsername) {
        userNameElem.textContent = `${greeting}, ${window.currentUsername}`;
      } else if (userNameElem) {
        userNameElem.textContent = `${greeting}, 创作者`;
      }
    }

    function showToastMessage(message, duration = 2000, isError = false) {
      let toast = document.querySelector('.custom-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'custom-toast';
        toast.style.cssText = `
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: #0f172ad9;
        backdrop-filter: blur(12px);
        color: white;
        padding: 0.5rem 1.2rem;
        border-radius: 40px;
        font-size: 0.8rem;
        font-weight: 500;
        z-index: 1100;
        transition: all 0.2s;
        pointer-events: none;
        font-family: system-ui;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 6px 14px rgba(0,0,0,0.1);
      `;
        document.body.appendChild(toast);
      }
      if (isError) {
        toast.style.background = '#dc2626d9';
      } else {
        toast.style.background = '#0f172ad9';
      }
      toast.textContent = message;
      toast.style.opacity = '1';
      toast.style.transform = 'translateX(-50%) translateY(0px)';
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(10px)';
      }, duration);
    }

    function showUploadProgress(message, isError = false) {
      let progressDiv = document.querySelector('.upload-progress');
      if (!progressDiv) {
        progressDiv = document.createElement('div');
        progressDiv.className = 'upload-progress';
        document.body.appendChild(progressDiv);
      }
      progressDiv.style.borderLeftColor = isError ? '#dc2626' : 'var(--accent-primary)';
      progressDiv.innerHTML = `<span>${escapeHtml(message)}</span>`;
      if (!isError) {
        setTimeout(() => {
          if (progressDiv && progressDiv.parentNode) {
            progressDiv.remove();
          }
        }, 3000);
      } else {
        setTimeout(() => {
          if (progressDiv && progressDiv.parentNode) {
            progressDiv.remove();
          }
        }, 2500);
      }
    }

    // 渲染当前页的文件列表
    function renderCurrentPage() {
      const tbody = document.getElementById('files-tbody');
      if (!tbody) return;

      const totalPages = Math.ceil(allFiles.length / PAGE_SIZE);
      const startIndex = (currentPage - 1) * PAGE_SIZE;
      const endIndex = startIndex + PAGE_SIZE;
      const pageFiles = allFiles.slice(startIndex, endIndex);

      if (pageFiles.length === 0 && allFiles.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty-state">📭 暂无文件，点击「上传文件」按钮开始</td></tr>`;
        updatePaginationUI(totalPages);
        return;
      }

      if (pageFiles.length === 0 && allFiles.length > 0) {
        // 理论上不应该发生，但为了安全
        currentPage = 1;
        renderCurrentPage();
        return;
      }

      tbody.innerHTML = pageFiles.map(file => {
        const filename = file.filename || file.name || '未命名';
        // 修复：正确获取文件大小，支持多种字段名
        let size = file.size;
        if (size === undefined || size === null) {
          size = file.fileSize || file.file_size || file.length || 0;
        }
        // 确保 size 是数字
        const numericSize = typeof size === 'number' ? size : parseInt(size, 10);
        const sizeInBytes = isNaN(numericSize) ? 0 : numericSize;

        const createdAt = file.createdAt || file.created_at || file.uploadTime || file.uploadedAt;
        const updatedAt = file.updatedAt || file.updated_at || file.modifiedAt || createdAt;
        const icon = getFileIcon(filename);
        const fileId = file.fileId || file.id || '';

        return `
        <tr data-file-id="${escapeHtml(String(fileId))}" data-filename="${escapeHtml(filename)}">
          <td>
            <div class="file-name-cell">
              <span class="file-icon">${icon}</span>
              <span style="font-weight: 500;">${escapeHtml(filename)}</span>
            </div>
          </td>
          <td><span class="file-size-badge">${formatFileSize(sizeInBytes)}</span></td>
          <td class="file-meta">${formatDateTime(createdAt)}</td>
          <td class="file-meta">${formatDateTime(updatedAt)}</td>
          <td>
            <div class="action-buttons">
              <button class="btn-icon btn-download" data-file-id="${escapeHtml(String(fileId))}" data-filename="${escapeHtml(filename)}" title="下载文件">
                ⬇️ 下载
              </button>
            </div>
          </td>
        </tr>
      `;
      }).join('');

      // 绑定下载按钮事件
      document.querySelectorAll('.btn-download').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const fileId = btn.getAttribute('data-file-id');
          const filename = btn.getAttribute('data-filename');
          if (fileId && fileId !== '' && fileId !== 'null' && fileId !== 'undefined') {
            await handleDownload(fileId, filename);
          } else {
            showToastMessage('❌ 无效的文件ID，无法下载', 1500, true);
          }
        });
      });

      updatePaginationUI(totalPages);
    }

    // 更新分页UI
    function updatePaginationUI(totalPages) {
      const totalFiles = allFiles.length;
      const paginationInfo = document.getElementById('pagination-info');
      const firstPageBtn = document.getElementById('first-page-btn');
      const prevPageBtn = document.getElementById('prev-page-btn');
      const nextPageBtn = document.getElementById('next-page-btn');
      const lastPageBtn = document.getElementById('last-page-btn');
      const pageNumbersSpan = document.getElementById('page-numbers');

      if (paginationInfo) {
        paginationInfo.textContent = `第 ${currentPage} / ${totalPages || 1} 页，共 ${totalFiles} 个文件`;
      }

      if (firstPageBtn) firstPageBtn.disabled = currentPage === 1 || totalFiles === 0;
      if (prevPageBtn) prevPageBtn.disabled = currentPage === 1 || totalFiles === 0;
      if (nextPageBtn) nextPageBtn.disabled = currentPage === totalPages || totalFiles === 0;
      if (lastPageBtn) lastPageBtn.disabled = currentPage === totalPages || totalFiles === 0;

      if (pageNumbersSpan && totalPages > 0) {
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + 4);
        if (endPage - startPage < 4) {
          startPage = Math.max(1, endPage - 4);
        }

        let pageButtonsHtml = '';
        for (let i = startPage; i <= endPage; i++) {
          const activeClass = i === currentPage ? 'active' : '';
          pageButtonsHtml += `<button class="pagination-btn ${activeClass}" data-page="${i}">${i}</button>`;
        }
        pageNumbersSpan.innerHTML = pageButtonsHtml;

        pageNumbersSpan.querySelectorAll('.pagination-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const page = parseInt(btn.getAttribute('data-page'), 10);
            if (!isNaN(page) && page !== currentPage) {
              currentPage = page;
              renderCurrentPage();
            }
          });
        });
      } else if (pageNumbersSpan && totalPages === 0) {
        pageNumbersSpan.innerHTML = '';
      }
    }

    // 下载文件
    async function handleDownload(fileId, filename) {
      try {
        showToastMessage(`⬇️ 正在下载 ${filename}...`, 1000);
        const {blob, filename: originalFilename} = await userApi.downloadFile(fileId);
        const downloadName = originalFilename || filename;
        triggerDownload(blob, downloadName);
        showToastMessage(`✅ 下载完成: ${downloadName}`, 1500);
      } catch (error) {
        console.error('Download failed:', error);
        let errorMsg = '下载失败';
        if (error.message && error.message.includes('404')) {
          errorMsg = '文件不存在或已被删除';
        } else if (error.message && error.message.includes('401')) {
          errorMsg = '登录已过期，请刷新页面';
          setTimeout(() => {
            localStorage.clear();
            window.location.href = '/static/login.html';
          }, 1500);
        } else {
          errorMsg = error.message || '下载失败，请重试';
        }
        showToastMessage(`❌ ${errorMsg}`, 2000, true);
      }
    }

    // 上传文件
    async function uploadFiles(files) {
      if (!files || files.length === 0) return;

      for (const file of files) {
        if (file.size > 100 * 1024 * 1024) {
          showToastMessage(`⚠️ ${file.name} 超过100MB，跳过上传`, 2000, true);
          continue;
        }

        showUploadProgress(`📤 正在上传 ${file.name} ...`);
        try {
          const result = await userApi.uploadFile(file);
          if (result?.status === 'success' || result?.data?.fileId) {
            showUploadProgress(`✅ ${file.name} 上传成功！`);
            showToastMessage(`✅ ${file.name} 上传成功`, 1500);
          } else {
            throw new Error(result?.message || '上传失败');
          }
        } catch (error) {
          console.error('Upload error:', error);
          showUploadProgress(`❌ ${file.name} 上传失败: ${error.message || '未知错误'}`, true);
          showToastMessage(`❌ ${file.name} 上传失败`, 2000, true);
        }
      }

      showToastMessage('🔄 刷新文件列表中...', 1000);
      await loadAllFilesAndResetPage();
    }

    // 加载所有文件并重置到第一页
    async function loadAllFilesAndResetPage() {
      const tbody = document.getElementById('files-tbody');
      if (tbody) {
        tbody.innerHTML = `<tr><td colspan="5" class="loading-state"><div class="spinner"></div> 正在同步云端文件...</td></tr>`;
      }

      try {
        const response = await userApi.getUserFiles();
        let files = [];
        if (response?.data?.files && Array.isArray(response.data.files)) {
          files = response.data.files;
        } else if (response?.files && Array.isArray(response.files)) {
          files = response.files;
        } else if (Array.isArray(response?.data)) {
          files = response.data;
        } else if (Array.isArray(response)) {
          files = response;
        }

        allFiles = files || [];
        currentPage = 1;
        renderCurrentPage();
      } catch (error) {
        console.error('load files error:', error);
        let errMsg = '加载失败，请重试';
        if (error?.response?.status === 401) {
          errMsg = '登录已失效，正在跳转登录页...';
          setTimeout(() => {
            localStorage.clear();
            window.location.href = '/static/login.html';
          }, 1200);
        }
        const tbodyEl = document.getElementById('files-tbody');
        if (tbodyEl) {
          tbodyEl.innerHTML = `<tr><td colspan="5" class="empty-state">⚠️ ${errMsg}<br/><button id="retry-files-btn" style="margin-top:12px; background:#eef2ff; border:none; padding:6px 14px; border-radius:30px; cursor:pointer;">重试</button></td></tr>`;
          const retryBtn = document.getElementById('retry-files-btn');
          if (retryBtn) retryBtn.addEventListener('click', () => loadAllFilesAndResetPage());
        }
      }
    }

    // 加载用户资料
    async function loadUserProfile() {
      const token = localStorage.getItem('accessToken');
      if (!token) {
        window.location.href = '/static/login.html';
        return false;
      }

      try {
        const profileResponse = await userApi.getUserProfile();
        const user = profileResponse?.data || profileResponse || {};

        if (!user || (!user.username && !user.userId && !user.id)) {
          throw new Error('Invalid profile');
        }

        const userId = user.userId || user.id || '—';
        const username = user.username || user.name || user.email || '用户';
        const createdAtRaw = user.createdAt || user.created_at || user.registerTime;
        const joinedDate = createdAtRaw ? formatDateTime(createdAtRaw) : '近期加入';

        document.getElementById('stat-user-id').innerText = userId;
        document.getElementById('stat-username').innerText = username;
        document.getElementById('stat-joined').innerText = joinedDate;

        window.currentUsername = username;
        setGreeting();

        return true;
      } catch (error) {
        console.error('profile error:', error);
        if (error?.response?.status === 401) {
          localStorage.clear();
          window.location.href = '/static/login.html';
        } else {
          document.getElementById('stat-user-id').innerText = '—';
          document.getElementById('stat-username').innerText = '请刷新页面';
          document.getElementById('stat-joined').innerText = '—';
          showToastMessage('无法加载用户信息，请检查网络', 2000, true);
        }
        return false;
      }
    }

    async function logoutHandler() {
      const confirmLogout = confirm('退出登录后需要重新验证，确定离开吗？');
      if (!confirmLogout) return;
      try {
        if (userApi.logout) await userApi.logout();
      } catch (e) { }
      localStorage.clear();
      showToastMessage('已安全退出', 800);
      setTimeout(() => {
        window.location.href = '/static/login.html';
      }, 300);
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      const profileOk = await loadUserProfile();
      if (!profileOk) {
        const token = localStorage.getItem('accessToken');
        if (!token) return;
        document.getElementById('app').style.display = 'block';
        const tbody = document.getElementById('files-tbody');
        if (tbody) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty-state">无法加载用户信息，请刷新页面重试</td></tr>';
        }
        const topLogoutBtn = document.getElementById('logout-top-btn');
        if (topLogoutBtn) topLogoutBtn.addEventListener('click', logoutHandler);
        const uploadBtn = document.getElementById('upload-file-btn');
        if (uploadBtn) {
          uploadBtn.addEventListener('click', () => {
            showToastMessage('请先刷新页面或重新登录', 1500, true);
          });
        }
        return;
      }

      const appDiv = document.getElementById('app');
      if (appDiv) appDiv.style.display = 'block';

      await loadAllFilesAndResetPage();

      // 上传按钮
      const uploadBtn = document.getElementById('upload-file-btn');
      const fileInput = document.getElementById('file-input');
      if (uploadBtn && fileInput) {
        uploadBtn.addEventListener('click', () => {
          fileInput.value = '';
          fileInput.click();
        });

        fileInput.addEventListener('change', async (e) => {
          const files = Array.from(e.target.files);
          if (files.length > 0) {
            await uploadFiles(files);
            fileInput.value = '';
          }
        });
      }

      // 分页按钮事件
      const firstPageBtn = document.getElementById('first-page-btn');
      const prevPageBtn = document.getElementById('prev-page-btn');
      const nextPageBtn = document.getElementById('next-page-btn');
      const lastPageBtn = document.getElementById('last-page-btn');

      if (firstPageBtn) {
        firstPageBtn.addEventListener('click', () => {
          if (currentPage !== 1) {
            currentPage = 1;
            renderCurrentPage();
          }
        });
      }

      if (prevPageBtn) {
        prevPageBtn.addEventListener('click', () => {
          if (currentPage > 1) {
            currentPage--;
            renderCurrentPage();
          }
        });
      }

      if (nextPageBtn) {
        nextPageBtn.addEventListener('click', () => {
          const totalPages = Math.ceil(allFiles.length / PAGE_SIZE);
          if (currentPage < totalPages) {
            currentPage++;
            renderCurrentPage();
          }
        });
      }

      if (lastPageBtn) {
        lastPageBtn.addEventListener('click', () => {
          const totalPages = Math.ceil(allFiles.length / PAGE_SIZE);
          if (currentPage !== totalPages && totalPages > 0) {
            currentPage = totalPages;
            renderCurrentPage();
          }
        });
      }

      const topLogoutBtn = document.getElementById('logout-top-btn');
      if (topLogoutBtn) topLogoutBtn.addEventListener('click', logoutHandler);
    });
  </script>
</body>
